<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生活輔導宣導單張</title>

<style>
body {
  font-family: "微軟正黑體";
  text-align: center;
  background: #f5f6fa;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.card:hover {
  transform: scale(1.05);
}

img {
  width: 100%;
  border-radius: 8px;
}
</style>

</head>

<body>

<h1>生活輔導宣導單張</h1>

<div class="gallery">

  <!-- 注意：這裡沒有 images/ -->

  <div class="card">
    <img src="./交通安全指引.png">
    <p>交通安全指引</p>
  </div>

  <div class="card">
    <img src="./反詐騙.png">
    <p>反詐騙</p>
  </div>

  <div class="card">
    <img src="./兩性平等.png">
    <p>兩性平等</p>
  </div>

</div>

</body>
</html>
