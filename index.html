<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生活輔導宣導單張</title>

<style>
body {
  font-family: "微軟正黑體";
  text-align: center;
}

h2 {
  margin-top: 40px;
  border-bottom: 2px solid #ccc;
  padding-bottom: 5px;
}

/* 跑馬燈 */
.carousel {
  position: relative;
  max-width: 500px;
  margin: 20px auto;
}

.carousel img {
  width: 100%;
  border-radius: 10px;
}

/* 左右按鈕 */
.prev, .next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
}

.prev { left: 0; }
.next { right: 0; }

</style>

</head>

<body>

<h1>生活輔導宣導單張</h1>

<div id="content"></div>

<script>

// 📦 原本資料 그대로使用
const data = {

"🚸 交通與安全": [
"交通安全指引.png",
"校內交通安全.png",
"校園交通安全.png",
"校園交通安全宣導.png",
"校園車輛減速慢行.png",
"微型電動車指南.png",
"清明連假交通安全.png",
"機車四寶.png",
"高三機車新手上路.jpg"
],

"⚖️ 法治 / 反詐騙 / 霸凌": [
"反詐騙.png",
"全民普發防詐.png",
"網路詐騙.png",
"網路霸凌.png",
"霸凌分界.jpg",
"辨識預防詐騙電子郵件.png",
"打工小心反變詐騙-日.png",
"打工小心反變詐騙-中.png"
],

"🧠 性平 / 人際": [
"兩性平等.png",
"校園性騷擾定義.png",
"校園性騷擾關鍵要素與類型.png",
"避免性騷擾他人之心法.png",
"讓言語充滿善意.png",
"讓言語充滿善意1.png",
"讓言語充滿善意 (2).png",
"好好說話.png"
],

"🩺 健康 / 生活": [
"一氧化碳.jpg",
"環境維護.png",
"寒假愛校時間.jpg",
"尊重自主隱私.png",
"尊重隱私.png",
"彩虹茶.png"
],

"🚨 防災 / 校園安全": [
"地震避難.png",
"地震避難三步驟.png",
"地震避難三步驟 (2).png",
"地下室停車場.png",
"校園安全.png",
"校園安全防護六原則.png",
"校園安全防護六步驟.png",
"校園安全防護守則.png"
],

"🚫 毒品防制": [
"拒絕毒品.png",
"新興毒品偽裝.png",
"查獲違禁品.png",
"禁止攜帶違禁品-直式.png",
"禁止攜帶違禁品-橫式.png",
"酷瑪介紹新興毒品-直.png",
"酷瑪介紹新興毒品-橫.png"
]

};

const container = document.getElementById("content");

let id = 0;

// 🔄 每個分類建立一個輪播
for (let category in data) {

  let currentIndex = 0;
  let images = data[category];

  let title = document.createElement("h2");
  title.innerText = category;

  let carousel = document.createElement("div");
  carousel.className = "carousel";

  let img = document.createElement("img");
  img.src = "./" + images[0];

  // 左右按鈕
  let prev = document.createElement("button");
  prev.className = "prev";
  prev.innerText = "◀";

  let next = document.createElement("button");
  next.className = "next";
  next.innerText = "▶";

  // 切換函式
  function updateImage() {
    img.src = "./" + images[currentIndex];
  }

  prev.onclick = () => {
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    updateImage();
  };

  next.onclick = () => {
    currentIndex = (currentIndex + 1) % images.length;
    updateImage();
  };

  // 自動輪播
  setInterval(() => {
    currentIndex = (currentIndex + 1) % images.length;
    updateImage();
  }, 3000);

  carousel.appendChild(prev);
  carousel.appendChild(img);
  carousel.appendChild(next);

  container.appendChild(title);
  container.appendChild(carousel);
}

</script>

</body>
</html>
